name: Monitor

on:
  # 保留 push 触发：当你手动修改代码提交时，立刻运行一次
  push:
    branches:
      - main 
  # 开启手动与 API 触发：让 cron-job.org 通过 API 准点唤醒它
  workflow_dispatch:    

jobs:
  run:
    runs-on: ubuntu-latest
    
    # 并发控制：防止多个任务撞车
    concurrency: 
      group: steam-monitor
      cancel-in-progress: true
      
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v6 
        
      - name: Setup Python
        uses: actions/setup-python@v6
        with: 
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install requests
        
      - name: Run Monitor Script
        run: python cs2_monitor.py
        
      - name: Commit and Push Data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update price data"
          file_pattern: "advanced_data.json"
