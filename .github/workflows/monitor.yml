name: Monitor
on:
  schedule:
    # 17,47 表示每小时的 17分 和 47分 运行，完美避开整点和半点的排队高峰
    - cron: '17,47 * * * *' 
  workflow_dispatch:    

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: 
          python-version: '3.10'
      - run: pip install requests
      - run: python cs2_monitor.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update price data"
          file_pattern: "advanced_data.json"
